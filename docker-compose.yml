services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: productmanagement-sql

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Pass123"

    ports:
      - "1433:1433"

    volumes:
      - sql_data:/var/opt/mssql

  productmanagement.api:

    build:
      context: .
      dockerfile: ProductManagement.API/Dockerfile

    container_name: productmanagement-api

    depends_on:
      - sqlserver

    ports:
      - "8080:8080"

    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=ProductManagementDb;User Id=sa;Password=YourStrong@Pass123;TrustServerCertificate=True;Encrypt=False"

volumes:
  sql_data: